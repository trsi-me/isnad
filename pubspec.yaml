name: isnad
description: نظام إسناد لإدارة البلاغات العسكرية
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.3.2
  path: ^1.9.0

  provider: ^6.1.1

  geolocator: ^11.0.0
  geocoding: ^3.0.0

  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  flutter_local_notifications: ^17.1.2
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.1

  image_picker: ^1.1.1
  permission_handler: ^11.3.1

  shared_preferences: ^2.2.3

  connectivity_plus: ^6.0.3

  intl: ^0.19.0
  uuid: ^4.4.0
  sqflite_common_ffi_web: ^1.0.1+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: IBMPlexSansArabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Thin.ttf
          weight: 100
        - asset: assets/fonts/IBMPlexSansArabic-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/IBMPlexSansArabic-Light.ttf
          weight: 300
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
